[terminal]

[[mouse.bindings]]
action = "PasteSelection"
mouse = "Middle"

[bell]
animation = "EaseOutExpo"
duration = 0

[colors]
draw_bold_text_with_bright_colors = true

[colors.bright]
black = "0x928374"
blue = "0x83a598"
cyan = "0x8ec07c"
green = "0xb8bb26"
magenta = "0xd3869b"
red = "0xfb4934"
white = "0xebdbb2"
yellow = "0xfabd2f"

[colors.normal]
black = "0x282828"
blue = "0x458588"
cyan = "0x689d6a"
green = "0x98971a"
magenta = "0xb16286"
red = "0xcc241d"
white = "0xa89984"
yellow = "0xd79921"

[colors.primary]
background = "0x282828"
foreground = "0xebdbb2"

#[dimensions]
#columns = 100
#lines = 24

[font]
size = 17

[font.normal]
family = "Source Code Pro"
style = "Regular"

# [mouse.double_click]
# threshold = 300
#
# [mouse.triple_click]
# threshold = 300

[selection]
semantic_escape_chars = ''',│`|:"' ()[]{}<>'''

[keyboard]

[terminal.shell]
args = ["--login"]
program = "/bin/zsh"

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
